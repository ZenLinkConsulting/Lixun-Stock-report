name: 每日股票报告

on:
  schedule:
    # 北京时间每天早上9点执行 (UTC 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: 发送报告到飞书
        run: |
          curl -X POST "https://open.feishu.cn/open-apis/bot/v2/hook/e90626c4-0f0a-40b3-9957-80eef34b490c" \
            -H "Content-Type: application/json" \
            -d '{
              "msg_type": "interactive",
              "card": {
                "header": {
                  "template": "red",
                  "title": {"content": "📊 立讯精密(002475) 每日分析报告", "tag": "plain_text"}
                },
                "elements": [
                  {"tag": "markdown", "content": "## 📈 一、资金面分析\n\n**股价表现**\n- 当前价格：77.19元\n- 成交量：约200万手\n\n---\n\n## 🏢 二、基本面分析\n\n**核心业务**\n- 消费电子(>70%)：苹果核心供应商\n- 汽车电子(~10%)：特斯拉、比亚迪\n\n**财务数据**\n- 2025年营收：3323亿元(+24%)\n- 2026年上半年预计：净利润78-81亿元(+18%~22%)\n\n---\n\n## 🌐 三、经济面分析\n\n- 全球消费电子市场突破8000亿美元\n- AI手机/PC加速落地\n\n---\n\n## ⚡ 四、突发事件\n\n1. OpenAI手机：立讯精密为独家系统制造商\n2. 赴港上市：已提交申请\n\n---\n\n## 🔮 五、明日预测\n\n**预测**：震荡偏强格局\n**建议**：77-79元区间操作，止损位75元"},
                  {"tag": "note", "elements": [{"tag": "plain_text", "content": "⚠️ 本报告由AI自动生成，仅供参考，不构成投资建议。"}]}
                ]
              }
            }'
